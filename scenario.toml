[green_agent]
agentbeats_id = "hepex-green-agent-local:v1"
env = { OPENAI_API_KEY = "${OPENAI_API_KEY}" }

# Purple Agent (participant being evaluated)
[[participants]]
agentbeats_id = "hepex-purple-agent-local:v1"
name = "purple_agent"  # Preferred participant role name for current AgentBeats / Green Agent flows
env = { OPENAI_API_KEY = "${OPENAI_API_KEY}" }

[config]
# Default upstream-style Hyy L1 task
task_dirs = ["tasks_public/t002_hyy_v5_l1"]

# Data directory for caches and run outputs inside the green-agent container
data_dir = "/home/agent/output"

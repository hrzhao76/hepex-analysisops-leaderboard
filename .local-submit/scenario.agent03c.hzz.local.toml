[green_agent]
image = "hepex-green-agent:local"
env = { OPENAI_API_KEY = "${OPENAI_API_KEY}", GREEN_SECRETS_JSON = "${GREEN_SECRETS_JSON}" }

# Purple Agent (participant being evaluated)
[[participants]]
image = "hepex-purple-agent:local"
name = "purple_agent"
env = { OPENAI_API_KEY = "${OPENAI_API_KEY}" }

[config]
# Local scenario: run all public HZZ4L levels against local Green/Purple images.
solver_backend = "agent_3c_scifi_native"
task_dirs = [
  "tasks_public/t005_hzz4l_l1",
  "tasks_public/t006_hzz4l_l2",
  "tasks_public/t007_hzz4l_l3",
]

# Data directory for caches and run outputs inside the green-agent container
data_dir = "/home/agent/output"
input_access_mode = "scenario_shared_mount"
shared_input_dir = "/home/agent/output/shared_input/{release}/{dataset}/{skim}"
allow_green_download = true
solver_request_timeout_seconds = 1800

[config.task_overrides.t005_hzz4l_l1]
enabled = true
mode = "call_white"
input_strategy = "shared_manifest"
max_files = 0

[config.task_overrides.t006_hzz4l_l2]
enabled = true
mode = "call_white"
input_strategy = "shared_manifest"
max_files = 0

[config.task_overrides.t007_hzz4l_l3]
enabled = true
mode = "call_white"
input_strategy = "shared_manifest"
max_files = 0
